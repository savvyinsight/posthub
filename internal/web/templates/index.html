{{define "index.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostHub - Publish Content</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-2xl mx-auto px-4 py-12">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">PostHub</h1>
            <p class="mt-2 text-gray-600">Publish content to your platforms</p>
        </div>

        <!-- Publish Form -->
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
            <h2 class="text-lg font-semibold text-gray-900 mb-4">New Publish Job</h2>

            <form hx-post="/publish"
                  hx-target="#status-container"
                  hx-swap="innerHTML"
                  hx-indicator="#submit-spinner"
                  class="space-y-4">

                <!-- Title -->
                <div>
                    <label for="title" class="block text-sm font-medium text-gray-700 mb-1">
                        Title
                    </label>
                    <input type="text"
                           id="title"
                           name="title"
                           required
                           placeholder="Enter content title"
                           class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm
                                  focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                                  placeholder-gray-400">
                </div>

                <!-- Body -->
                <div>
                    <label for="body" class="block text-sm font-medium text-gray-700 mb-1">
                        Content
                    </label>
                    <textarea id="body"
                              name="body"
                              rows="6"
                              required
                              placeholder="Write your content here..."
                              class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm
                                     focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                                     placeholder-gray-400 resize-y"></textarea>
                </div>

                <!-- Platform -->
                <div>
                    <label for="platform" class="block text-sm font-medium text-gray-700 mb-1">
                        Platform
                    </label>
                    <select id="platform"
                            name="platform"
                            required
                            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm
                                   focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                                   bg-white">
                        <option value="">Select platform</option>
                        <option value="twitter">Twitter / X</option>
                        <option value="mastodon">Mastodon</option>
                        <option value="linkedin">LinkedIn</option>
                        <option value="devto">DEV.to</option>
                        <option value="ghost">Ghost</option>
                    </select>
                </div>

                <!-- Submit -->
                <div class="flex items-center gap-3 pt-2">
                    <button type="submit"
                            class="inline-flex items-center px-4 py-2 bg-blue-600 text-white
                                   font-medium rounded-md hover:bg-blue-700 focus:outline-none
                                   focus:ring-2 focus:ring-offset-2 focus:ring-blue-500
                                   disabled:opacity-50 disabled:cursor-not-allowed">
                        <svg id="submit-spinner"
                             class="animate-spin -ml-1 mr-2 h-4 w-4 text-white hidden"
                             xmlns="http://www.w3.org/2000/svg"
                             fill="none"
                             viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                        Publish
                    </button>

                    <span class="htmx-indicator text-sm text-gray-500">
                        Submitting...
                    </span>
                </div>
            </form>
        </div>

        <!-- Status Container -->
        <div id="status-container" class="mt-6">
            <!-- Status updates will be inserted here by HTMX -->
        </div>

        <!-- Footer -->
        <div class="mt-12 text-center text-sm text-gray-500">
            <p>PostHub Demo UI · <a href="/health" class="text-blue-600 hover:underline">Health Check</a></p>
        </div>
    </div>
</body>
</html>
{{end}}
