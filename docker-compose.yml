services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: posthub
      POSTGRES_PASSWORD: posthub
      POSTGRES_DB: posthub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posthub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://posthub:posthub@postgres:5432/posthub?sslmode=disable
      REDIS_URL: redis://redis:6379
      API_PORT: "8080"
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["posthub-worker"]
    environment:
      DATABASE_URL: postgres://posthub:posthub@postgres:5432/posthub?sslmode=disable
      REDIS_URL: redis://redis:6379
      WORKER_CONCURRENCY: "5"
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
